{% extends "layouts/base.html" %}

{% block title %}Facturas (CFDIs){% endblock %}

{% block head %}
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  .cfdi-badge {
    display: inline-flex; align-items: center;
    padding: 2px 8px; border-radius: 4px;
    font-size: 11px; font-weight: 600; letter-spacing: .02em;
  }
  .cfdi-badge-I  { background: #ecfdf5; color: #059669; }
  .cfdi-badge-E  { background: #fff1f2; color: #e11d48; }
  .cfdi-badge-P  { background: #f1f5f9; color: #64748b; }
  .cfdi-badge-N  { background: #fffbeb; color: #d97706; }
  .cfdi-badge-T  { background: #eff6ff; color: #2563eb; }
  .cfdi-badge-R  { background: #faf5ff; color: #7c3aed; }

  .detail-panel {
    position: fixed; top: 0; right: 0; bottom: 0;
    width: min(480px, 100vw);
    background: white;
    box-shadow: -8px 0 30px -8px rgba(15,23,42,.18);
    z-index: 50;
    display: flex; flex-direction: column;
    transform: translateX(100%);
    transition: transform .22s cubic-bezier(.4,0,.2,1);
  }
  .detail-panel.open { transform: translateX(0); }

  .chip-btn {
    padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 500;
    border: 1px solid #e2e8f0; background: white; color: #64748b; cursor: pointer;
    transition: all .15s;
  }
  .chip-btn:hover { border-color: #94a3b8; color: #1e293b; }
  .chip-btn.active { background: #0ea5e9; border-color: #0ea5e9; color: white; }

  .kpi-card {
    background: white; border-radius: 12px;
    border: 1px solid #e2e8f0;
    padding: 20px 24px;
    box-shadow: 0 1px 3px rgba(15,23,42,.06);
  }

  .cfdi-tr { cursor: pointer; transition: background .1s; }
  .cfdi-tr:hover { background: #f8fafc; }
  .cfdi-tr.selected { background: #f0f9ff; }

  .overlay {
    position: fixed; inset: 0; background: rgba(15,23,42,.25);
    z-index: 49; opacity: 0; pointer-events: none; transition: opacity .22s;
  }
  .overlay.visible { opacity: 1; pointer-events: auto; }
</style>
{% endblock %}

{% block content %}
<div id="cfdis-root" style="min-height:50vh;"></div>
{% endblock %}

{% block scripts %}
{% raw %}
<script type="text/babel">
const { useState, useEffect, useMemo, useRef, useCallback } = React;

// ── formatters ────────────────────────────────────────────────────────────
const fmtMXN = new Intl.NumberFormat('es-MX', { style: 'currency', currency: 'MXN', maximumFractionDigits: 0 });
const fmtNum = new Intl.NumberFormat('es-MX', { maximumFractionDigits: 0 });
const fmt = (n) => fmtMXN.format(n);
const fmtN = (n) => fmtNum.format(n);

const TIPO_LABEL = { I: 'Ingreso', E: 'Egreso', P: 'Pago', N: 'Nómina', T: 'Traslado', R: 'Devolución' };
const TIPO_COLOR_HEX = { I: '#059669', E: '#e11d48', P: '#64748b', N: '#d97706', T: '#2563eb', R: '#7c3aed' };
const PERIODO_DAYS = { hoy: 1, semana: 7, mes: 30, trimestre: 90, año: 365, todo: null };

function periodCutoff(key) {
  if (!PERIODO_DAYS[key]) return null;
  const d = new Date();
  d.setDate(d.getDate() - PERIODO_DAYS[key]);
  return d;
}

const PER_PAGE = 50;

// ── KPI Card ──────────────────────────────────────────────────────────────
function KpiCard({ label, value, sub, accent }) {
  return (
    <div className="kpi-card flex-1 min-w-0">
      <p style={{ fontSize: 11, fontWeight: 600, color: '#94a3b8', letterSpacing: '.06em', textTransform: 'uppercase' }}>{label}</p>
      <p style={{ fontSize: 24, fontWeight: 700, color: accent || '#1e293b', marginTop: 4, lineHeight: 1.2 }}>{value}</p>
      {sub && <p style={{ fontSize: 12, color: '#94a3b8', marginTop: 4 }}>{sub}</p>}
    </div>
  );
}

// ── SVG Line Chart ────────────────────────────────────────────────────────
function LineChart({ data }) {
  if (!data.length) {
    return <div style={{ display:'flex', alignItems:'center', justifyContent:'center', height:'100%', color:'#94a3b8', fontSize:13 }}>Sin datos</div>;
  }
  const W = 560, H = 130, PAD_B = 28;
  const maxVal = Math.max(...data.flatMap(d => [d.ingresos, d.gastos]), 1);
  const n = data.length;
  const xStep = n > 1 ? W / (n - 1) : W;
  const xOf = (i) => i * xStep;
  const yOf = (v) => H - (v / maxVal) * H;

  const linePath = (key) =>
    data.map((d, i) => `${i ? 'L' : 'M'}${xOf(i).toFixed(1)},${yOf(d[key]).toFixed(1)}`).join(' ');

  const areaPath = (key, base) =>
    `${linePath(key)} L${xOf(n-1).toFixed(1)},${yOf(base).toFixed(1)} L0,${yOf(base).toFixed(1)} Z`;

  const every = Math.max(1, Math.ceil(n / 7));
  const idI = `area-i-${Math.random().toString(36).slice(2)}`;
  const idE = `area-e-${Math.random().toString(36).slice(2)}`;

  return (
    <svg viewBox={`0 0 ${W} ${H + PAD_B}`} style={{ width: '100%', height: '100%' }}>
      <defs>
        <linearGradient id={idI} x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor="#10b981" stopOpacity="0.15" />
          <stop offset="100%" stopColor="#10b981" stopOpacity="0" />
        </linearGradient>
        <linearGradient id={idE} x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor="#f43f5e" stopOpacity="0.12" />
          <stop offset="100%" stopColor="#f43f5e" stopOpacity="0" />
        </linearGradient>
      </defs>
      {[0, 0.5, 1].map(t => (
        <line key={t} x1={0} x2={W} y1={yOf(maxVal * t)} y2={yOf(maxVal * t)}
          stroke="#f1f5f9" strokeWidth="1" />
      ))}
      <path d={areaPath('gastos', 0)} fill={`url(#${idE})`} />
      <path d={areaPath('ingresos', 0)} fill={`url(#${idI})`} />
      <path d={linePath('gastos')} fill="none" stroke="#f43f5e" strokeWidth="2" strokeLinejoin="round" />
      <path d={linePath('ingresos')} fill="none" stroke="#10b981" strokeWidth="2" strokeLinejoin="round" />
      {data.map((d, i) => (
        i % every === 0 || i === n - 1 ? (
          <text key={d.month} x={xOf(i)} y={H + PAD_B - 4}
            textAnchor={i === 0 ? 'start' : i === n - 1 ? 'end' : 'middle'}
            fontSize="10" fill="#94a3b8">
            {d.month.slice(2)}
          </text>
        ) : null
      ))}
    </svg>
  );
}

// ── SVG Donut ─────────────────────────────────────────────────────────────
function DonutChart({ segments, total }) {
  const CX = 72, CY = 72, R = 54, SW = 20;
  const C = 2 * Math.PI * R;
  let cum = 0;
  const tot = segments.reduce((s, d) => s + d.value, 0) || 1;

  return (
    <svg viewBox="0 0 144 144" style={{ width: '100%', height: '100%' }}>
      <circle cx={CX} cy={CY} r={R} fill="none" stroke="#f1f5f9" strokeWidth={SW} />
      {segments.filter(s => s.value > 0).map(seg => {
        const frac = seg.value / tot;
        const dash = frac * C;
        const rot = (cum / tot) * 360 - 90;
        cum += seg.value;
        return (
          <circle key={seg.label} cx={CX} cy={CY} r={R}
            fill="none" stroke={seg.color} strokeWidth={SW}
            strokeDasharray={`${dash.toFixed(2)} ${(C - dash).toFixed(2)}`}
            transform={`rotate(${rot.toFixed(2)} ${CX} ${CY})`} />
        );
      })}
      <text x={CX} y={CY - 7} textAnchor="middle"
        style={{ fontSize: 18, fontWeight: 700, fill: '#1e293b' }}>
        {fmtN(tot)}
      </text>
      <text x={CX} y={CY + 12} textAnchor="middle"
        style={{ fontSize: 10, fill: '#94a3b8' }}>facturas</text>
    </svg>
  );
}

// ── Detail Panel ──────────────────────────────────────────────────────────
function DetailPanel({ factura: f, onClose }) {
  const open = !!f;
  return (
    <>
      <div className={`overlay${open ? ' visible' : ''}`} onClick={onClose} />
      <div className={`detail-panel${open ? ' open' : ''}`}>
        {f && (
          <>
            <div style={{ padding: '20px 24px', borderBottom: '1px solid #e2e8f0', display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
              <div>
                <span className={`cfdi-badge cfdi-badge-${f.tipo}`}>{TIPO_LABEL[f.tipo] || f.tipo}</span>
                <p style={{ fontSize: 11, color: '#94a3b8', marginTop: 6, fontFamily: 'monospace' }}>{f.uuid}</p>
              </div>
              <button onClick={onClose} style={{ background: 'none', border: 'none', cursor: 'pointer', color: '#94a3b8', fontSize: 20, lineHeight: 1 }}>✕</button>
            </div>
            <div style={{ overflowY: 'auto', flex: 1, padding: '20px 24px' }}>
              {/* totals */}
              <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: 12, marginBottom: 20 }}>
                <DetailField label="Subtotal" value={fmt(f.subtotal)} />
                <DetailField label="IVA" value={fmt(f.iva)} />
                <DetailField label="Total" value={fmt(f.total)} accent="#0ea5e9" />
              </div>
              {/* comprobante */}
              <Section title="Comprobante">
                <DetailField label="Fecha" value={f.fecha.slice(0, 10)} />
                <DetailField label="Folio" value={f.folio || '—'} />
                <DetailField label="Moneda" value={f.moneda || '—'} />
                <DetailField label="Forma de pago" value={f.forma_pago || '—'} />
                <DetailField label="Método de pago" value={f.metodo_pago || '—'} />
              </Section>
              {/* emisor */}
              <Section title="Emisor">
                <DetailField label="RFC" value={f.emisor_rfc} mono />
                <DetailField label="Nombre" value={f.emisor_nombre} />
              </Section>
              {/* receptor */}
              <Section title="Receptor">
                <DetailField label="RFC" value={f.receptor_rfc} mono />
                <DetailField label="Nombre" value={f.receptor_nombre} />
              </Section>
              {/* concepto */}
              {f.concepto && (
                <Section title="Concepto">
                  <p style={{ fontSize: 13, color: '#334155', lineHeight: 1.5 }}>{f.concepto}</p>
                </Section>
              )}
            </div>
          </>
        )}
      </div>
    </>
  );
}

function Section({ title, children }) {
  return (
    <div style={{ marginBottom: 20 }}>
      <p style={{ fontSize: 10, fontWeight: 700, color: '#94a3b8', letterSpacing: '.08em', textTransform: 'uppercase', marginBottom: 10 }}>{title}</p>
      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10 }}>
        {children}
      </div>
    </div>
  );
}

function DetailField({ label, value, accent, mono }) {
  return (
    <div>
      <p style={{ fontSize: 10, color: '#94a3b8', marginBottom: 2 }}>{label}</p>
      <p style={{ fontSize: 13, fontWeight: 500, color: accent || '#1e293b', fontFamily: mono ? 'monospace' : undefined, wordBreak: 'break-all' }}>
        {value || '—'}
      </p>
    </div>
  );
}

// ── Pager ─────────────────────────────────────────────────────────────────
function Pager({ page, total, onChange }) {
  if (total <= 1) return null;
  const pages = [];
  const start = Math.max(1, page - 2);
  const end = Math.min(total, page + 2);
  for (let i = start; i <= end; i++) pages.push(i);

  const btn = (label, target, disabled) => (
    <button key={label} onClick={() => !disabled && onChange(target)} disabled={disabled}
      style={{ padding: '4px 10px', borderRadius: 6, border: '1px solid #e2e8f0', background: target === page ? '#0ea5e9' : 'white',
        color: target === page ? 'white' : disabled ? '#cbd5e1' : '#475569',
        cursor: disabled ? 'default' : 'pointer', fontSize: 12, fontWeight: 500 }}>
      {label}
    </button>
  );

  return (
    <div style={{ display: 'flex', alignItems: 'center', gap: 6, marginTop: 16, justifyContent: 'flex-end' }}>
      {btn('←', page - 1, page === 1)}
      {pages.map(p => btn(p, p, false))}
      {btn('→', page + 1, page === total)}
      <span style={{ fontSize: 12, color: '#94a3b8', marginLeft: 8 }}>Pág. {page}/{total}</span>
    </div>
  );
}

// ── Top Clients Component ─────────────────────────────────────────────────
function TopClients({ facturas, onClientClick, activeClient }) {
  const tops = useMemo(() => {
    const map = {};
    facturas.forEach(f => {
      // The "other party" (not the company): if emitido, receptor is client; if recibido, emisor is provider
      const rfc    = f.es_emitido ? f.receptor_rfc    : f.emisor_rfc;
      const nombre = f.es_emitido ? f.receptor_nombre : f.emisor_nombre;
      const key = rfc || nombre || '?';
      if (!map[key]) map[key] = { rfc, nombre, ingreso: 0, egreso: 0, count: 0 };
      if (f.es_emitido) map[key].ingreso += f.total;
      else               map[key].egreso  += f.total;
      map[key].count++;
    });
    return Object.values(map)
      .sort((a, b) => (b.ingreso + b.egreso) - (a.ingreso + a.egreso))
      .slice(0, 12);
  }, [facturas]);

  if (!tops.length) return null;
  const maxTotal = Math.max(...tops.map(c => c.ingreso + c.egreso), 1);

  return (
    <div className="kpi-card">
      <p style={{ fontSize: 12, fontWeight: 600, color: '#475569', marginBottom: 14 }}>Top clientes / proveedores</p>
      {tops.map((c, i) => {
        const total = c.ingreso + c.egreso;
        const isActive = activeClient === (c.rfc || c.nombre);
        return (
          <div key={c.rfc || i}
            onClick={() => onClientClick(isActive ? null : (c.rfc || c.nombre))}
            style={{ marginBottom: 12, cursor: 'pointer', padding: '6px 8px', borderRadius: 8,
              background: isActive ? '#f0f9ff' : 'transparent', transition: 'background .15s' }}>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: 4 }}>
              <div style={{ minWidth: 0, flex: 1, marginRight: 8 }}>
                <p style={{ fontSize: 12, fontWeight: 600, color: isActive ? '#0369a1' : '#334155',
                  overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap', margin: 0 }}>
                  {c.nombre || c.rfc || 'Sin nombre'}
                </p>
                <p style={{ fontSize: 10, color: '#94a3b8', margin: 0, fontFamily: 'monospace' }}>{c.rfc}</p>
              </div>
              <div style={{ textAlign: 'right', flexShrink: 0 }}>
                <p style={{ fontSize: 12, fontWeight: 700, color: '#1e293b', margin: 0 }}>{fmt(total)}</p>
                <p style={{ fontSize: 10, color: '#94a3b8', margin: 0 }}>{c.count} fact.</p>
              </div>
            </div>
            <div style={{ height: 4, borderRadius: 2, background: '#f1f5f9', overflow: 'hidden', display: 'flex' }}>
              {c.ingreso > 0 && (
                <div style={{ height: '100%', width: `${(c.ingreso / total) * (total / maxTotal) * 100}%`, background: '#10b981' }} />
              )}
              {c.egreso > 0 && (
                <div style={{ height: '100%', width: `${(c.egreso / total) * (total / maxTotal) * 100}%`, background: '#f43f5e' }} />
              )}
            </div>
          </div>
        );
      })}
    </div>
  );
}

// ── Main App ──────────────────────────────────────────────────────────────
function App() {
  const [all, setAll] = useState([]);
  const [companyRfcs, setCompanyRfcs] = useState([]);
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState(null);
  const [search, setSearch] = useState('');
  const [periodo, setPeriodo] = useState('mes');
  const [dirFil, setDirFil] = useState('todos');   // 'todos' | 'emitidos' | 'recibidos'
  const [tipoFil, setTipoFil] = useState('todos');
  const [yearFil, setYearFil] = useState('todos');
  const [clientFil, setClientFil] = useState(null); // RFC or nombre string
  const [page, setPage] = useState(1);
  const [selected, setSelected] = useState(null);

  const years = useMemo(() => {
    const ys = new Set(all.map(f => (f.fecha || '').slice(0, 4)).filter(y => /^\d{4}$/.test(y)));
    return [...ys].sort((a, b) => b.localeCompare(a));
  }, [all]);

  useEffect(() => {
    fetch('/api/admin/cfdis/data', { credentials: 'same-origin' })
      .then(r => { if (!r.ok) throw new Error(r.status); return r.json(); })
      .then(d => {
        setCompanyRfcs(d.company_rfcs || []);
        setAll(d.items || []);
        setLoading(false);
      })
      .catch(e => { setError(e.message); setLoading(false); });
  }, []);

  const filtered = useMemo(() => {
    const yearMode = yearFil !== 'todos';
    const cutoff = yearMode ? null : periodCutoff(periodo);
    const q = search.toLowerCase().trim();
    return all.filter(f => {
      if (yearMode && (f.fecha || '').slice(0, 4) !== yearFil) return false;
      if (!yearMode && cutoff && new Date(f.fecha) < cutoff) return false;
      if (dirFil === 'emitidos'  && !f.es_emitido)  return false;
      if (dirFil === 'recibidos' &&  f.es_emitido)  return false;
      if (tipoFil !== 'todos' && f.tipo !== tipoFil) return false;
      if (clientFil) {
        const other = f.es_emitido
          ? (f.receptor_rfc || f.receptor_nombre)
          : (f.emisor_rfc   || f.emisor_nombre);
        if (other !== clientFil) return false;
      }
      if (q) {
        const haystack = `${f.uuid} ${f.folio} ${f.emisor_rfc} ${f.emisor_nombre} ${f.receptor_rfc} ${f.receptor_nombre} ${f.concepto}`.toLowerCase();
        if (!haystack.includes(q)) return false;
      }
      return true;
    });
  }, [all, search, periodo, dirFil, tipoFil, yearFil, clientFil]);

  // KPIs: ingresos = emitidos tipo I, egresos = recibidos tipo I (real expenses)
  const kpis = useMemo(() => {
    const emitidos  = filtered.filter(f => f.es_emitido  && f.tipo === 'I');
    const recibidos = filtered.filter(f => !f.es_emitido && f.tipo === 'I');
    const ingresos  = emitidos.reduce((s, f)  => s + f.total, 0);
    const egresos   = recibidos.reduce((s, f) => s + f.total, 0);
    const iva       = filtered.reduce((s, f)  => s + f.iva,   0);
    return { ingresos, egresos, utilidad: ingresos - egresos, iva, count: filtered.length,
      nEmitidos: emitidos.length, nRecibidos: recibidos.length };
  }, [filtered]);

  // monthly chart: aggregate using direction (es_emitido), skip tipo P (total=0)
  const monthly = useMemo(() => {
    const yearMode = yearFil !== 'todos';
    const source = all.filter(f =>
      f.tipo !== 'P' && f.total > 0 &&
      (!yearMode || (f.fecha || '').slice(0, 4) === yearFil)
    );
    const map = {};
    source.forEach(f => {
      const m = (f.fecha || '').slice(0, 7);
      if (!m) return;
      if (!map[m]) map[m] = { month: m, ingresos: 0, gastos: 0 };
      if (f.es_emitido) map[m].ingresos += f.total;
      else              map[m].gastos   += f.total;
    });
    const sorted = Object.values(map).sort((a, b) => a.month.localeCompare(b.month));
    return yearMode ? sorted : sorted.slice(-12);
  }, [all, yearFil]);

  // Donut: direction breakdown (not tipo)
  const donutSegs = useMemo(() => {
    const counts = { Emitidas: 0, Recibidas: 0 };
    filtered.forEach(f => {
      if (f.es_emitido) counts['Emitidas']++;
      else              counts['Recibidas']++;
    });
    return [
      { label: 'Emitidas',  value: counts['Emitidas'],  color: '#10b981' },
      { label: 'Recibidas', value: counts['Recibidas'], color: '#f43f5e' },
    ].filter(s => s.value > 0);
  }, [filtered]);

  const totalPages = Math.ceil(filtered.length / PER_PAGE);
  const pageItems  = filtered.slice((page - 1) * PER_PAGE, page * PER_PAGE);

  useEffect(() => { setPage(1); }, [search, periodo, dirFil, tipoFil, yearFil, clientFil]);

  // ── Loading / Error ──
  if (loading) {
    return (
      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', height: 200, color: '#94a3b8', gap: 12, fontSize: 14 }}>
        <svg style={{ width: 24, height: 24, animation: 'spin 1s linear infinite' }} viewBox="0 0 24 24" fill="none">
          <style>{`@keyframes spin{to{transform:rotate(360deg)}}`}</style>
          <circle cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="3" strokeOpacity=".25" />
          <path d="M22 12a10 10 0 00-10-10" stroke="currentColor" strokeWidth="3" strokeLinecap="round" />
        </svg>
        Cargando facturas…
      </div>
    );
  }
  if (error) {
    return <div style={{ padding: 24, color: '#e11d48' }}>Error al cargar facturas: {error}</div>;
  }

  return (
    <div style={{ maxWidth: 1280, margin: '0 auto' }}>
      {/* ── Header ── */}
      <div style={{ display: 'flex', alignItems: 'flex-end', justifyContent: 'space-between', marginBottom: 24 }}>
        <div>
          <h1 style={{ fontSize: 22, fontWeight: 700, color: '#0f172a' }}>Facturas (CFDIs)</h1>
          <p style={{ fontSize: 13, color: '#94a3b8', marginTop: 4 }}>
            {fmtN(all.length)} total · {fmtN(filtered.length)} en vista
          </p>
        </div>
      </div>

      {/* ── KPI Cards ── */}
      <div style={{ display: 'flex', gap: 14, marginBottom: 24, flexWrap: 'wrap' }}>
        <KpiCard label="Ingresos (emitidas)" value={fmt(kpis.ingresos)} sub={`${fmtN(kpis.nEmitidos)} facturas emitidas`} accent="#059669" />
        <KpiCard label="Egresos (recibidas)" value={fmt(kpis.egresos)} sub={`${fmtN(kpis.nRecibidos)} facturas recibidas`} accent="#e11d48" />
        <KpiCard label="Utilidad neta" value={fmt(kpis.utilidad)} accent={kpis.utilidad >= 0 ? '#059669' : '#e11d48'} sub="Ingresos − Egresos" />
        <KpiCard label="IVA trasladado" value={fmt(kpis.iva)} sub={`${fmtN(kpis.count)} facturas total`} accent="#0ea5e9" />
      </div>

      {/* ── Charts ── */}
      {all.length > 0 && (
        <div style={{ display: 'grid', gridTemplateColumns: '1fr 200px 280px', gap: 14, marginBottom: 24 }}>
          <div className="kpi-card">
            <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 12 }}>
              <p style={{ fontSize: 12, fontWeight: 600, color: '#475569' }}>
                Ingresos vs. Egresos {yearFil !== 'todos' ? yearFil : '(últimos 12 meses)'}
              </p>
              <div style={{ display: 'flex', gap: 12, fontSize: 11, color: '#64748b' }}>
                <span><span style={{ display:'inline-block', width:10, height:10, borderRadius:2, background:'#10b981', marginRight:4 }}></span>Emitidas</span>
                <span><span style={{ display:'inline-block', width:10, height:10, borderRadius:2, background:'#f43f5e', marginRight:4 }}></span>Recibidas</span>
              </div>
            </div>
            <div style={{ height: 158 }}>
              <LineChart data={monthly} />
            </div>
          </div>
          <div className="kpi-card" style={{ display: 'flex', flexDirection: 'column' }}>
            <p style={{ fontSize: 12, fontWeight: 600, color: '#475569', marginBottom: 8 }}>Emitidas vs. Recibidas</p>
            <div style={{ flex: 1 }}>
              <DonutChart segments={donutSegs} total={filtered.length} />
            </div>
            <div style={{ marginTop: 8 }}>
              {donutSegs.map(s => (
                <div key={s.label} style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginTop: 4 }}>
                  <span style={{ display: 'flex', alignItems: 'center', gap: 6, fontSize: 11, color: '#64748b' }}>
                    <span style={{ width: 8, height: 8, borderRadius: '50%', background: s.color, display: 'inline-block' }}></span>
                    {s.label}
                  </span>
                  <span style={{ fontSize: 11, fontWeight: 600, color: '#334155' }}>{fmtN(s.value)}</span>
                </div>
              ))}
            </div>
          </div>
          <TopClients facturas={filtered} onClientClick={rfc => setClientFil(rfc)} activeClient={clientFil} />
        </div>
      )}

      {/* ── Filter Bar ── */}
      <div style={{ background: 'white', border: '1px solid #e2e8f0', borderRadius: 12, padding: '14px 18px', marginBottom: 16, display: 'flex', flexWrap: 'wrap', gap: 12, alignItems: 'center' }}>
        {/* search */}
        <div style={{ position: 'relative', flex: '1 1 200px', minWidth: 160 }}>
          <svg style={{ position: 'absolute', left: 10, top: '50%', transform: 'translateY(-50%)', width: 14, height: 14, color: '#94a3b8' }} viewBox="0 0 20 20" fill="currentColor">
            <path fillRule="evenodd" d="M9 3a6 6 0 100 12A6 6 0 009 3zM1 9a8 8 0 1114.32 4.906l3.387 3.387a1 1 0 01-1.414 1.414l-3.387-3.387A8 8 0 011 9z" clipRule="evenodd" />
          </svg>
          <input value={search} onChange={e => setSearch(e.target.value)}
            placeholder="Buscar UUID, RFC, nombre, concepto…"
            style={{ width: '100%', paddingLeft: 30, paddingRight: 10, paddingTop: 6, paddingBottom: 6, border: '1px solid #e2e8f0', borderRadius: 8, fontSize: 13, outline: 'none', boxSizing: 'border-box', color: '#1e293b' }} />
        </div>
        {/* year select */}
        {years.length > 0 && (
          <select value={yearFil} onChange={e => setYearFil(e.target.value)}
            style={{ padding: '5px 10px', border: '1px solid #e2e8f0', borderRadius: 8, fontSize: 13, color: '#475569', background: 'white', cursor: 'pointer' }}>
            <option value="todos">Todos los años</option>
            {years.map(y => <option key={y} value={y}>{y}</option>)}
          </select>
        )}
        {/* direction chips */}
        <div style={{ display: 'flex', gap: 6 }}>
          {[['todos','Todas'],['emitidos','Emitidas'],['recibidos','Recibidas']].map(([k, label]) => (
            <button key={k} className={`chip-btn${dirFil === k ? ' active' : ''}`}
              onClick={() => setDirFil(k)}>{label}</button>
          ))}
        </div>
        {/* period chips — disabled when a specific year is selected */}
        <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap', opacity: yearFil !== 'todos' ? 0.35 : 1, pointerEvents: yearFil !== 'todos' ? 'none' : 'auto', transition: 'opacity .2s' }}>
          {Object.keys(PERIODO_DAYS).map(k => (
            <button key={k} className={`chip-btn${periodo === k ? ' active' : ''}`}
              onClick={() => setPeriodo(k)}>
              {k.charAt(0).toUpperCase() + k.slice(1)}
            </button>
          ))}
        </div>
        {/* tipo select */}
        <select value={tipoFil} onChange={e => setTipoFil(e.target.value)}
          style={{ padding: '5px 10px', border: '1px solid #e2e8f0', borderRadius: 8, fontSize: 13, color: '#475569', background: 'white', cursor: 'pointer' }}>
          <option value="todos">Todos los tipos</option>
          {Object.entries(TIPO_LABEL).map(([k, v]) => <option key={k} value={k}>{v}</option>)}
        </select>
        {/* active client indicator */}
        {clientFil && (
          <div style={{ display: 'flex', alignItems: 'center', gap: 6, background: '#f0f9ff', border: '1px solid #bae6fd', borderRadius: 8, padding: '4px 10px', fontSize: 12, color: '#0369a1' }}>
            <span>Cliente: <strong>{clientFil}</strong></span>
            <button onClick={() => setClientFil(null)} style={{ background: 'none', border: 'none', cursor: 'pointer', color: '#0369a1', fontSize: 14, lineHeight: 1, padding: 0 }}>✕</button>
          </div>
        )}
      </div>

      {/* ── Table ── */}
      <div style={{ background: 'white', border: '1px solid #e2e8f0', borderRadius: 12, overflow: 'hidden', boxShadow: '0 1px 3px rgba(15,23,42,.06)' }}>
        <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: 13 }}>
          <thead>
            <tr style={{ background: '#f8fafc', borderBottom: '1px solid #e2e8f0' }}>
              {['Fecha','Tipo','Emisor','Receptor','Concepto','Total','Moneda'].map(h => (
                <th key={h} style={{ padding: '10px 14px', textAlign: 'left', fontWeight: 600, fontSize: 11, color: '#64748b', letterSpacing: '.04em', textTransform: 'uppercase', whiteSpace: 'nowrap' }}>{h}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {pageItems.length === 0 && (
              <tr><td colSpan={7} style={{ padding: '32px 16px', textAlign: 'center', color: '#94a3b8', fontSize: 13 }}>
                No hay CFDIs para los filtros seleccionados.
              </td></tr>
            )}
            {pageItems.map(f => (
              <tr key={f.uuid} className={`cfdi-tr${selected?.uuid === f.uuid ? ' selected' : ''}`}
                onClick={() => setSelected(selected?.uuid === f.uuid ? null : f)}
                style={{ borderBottom: '1px solid #f1f5f9' }}>
                <td style={{ padding: '10px 14px', color: '#475569', whiteSpace: 'nowrap' }}>{(f.fecha||'').slice(0,10)}</td>
                <td style={{ padding: '10px 14px' }}>
                  <span className={`cfdi-badge cfdi-badge-${f.tipo}`}>{TIPO_LABEL[f.tipo] || f.tipo}</span>
                  <span style={{ display: 'block', fontSize: 10, color: f.es_emitido ? '#059669' : '#e11d48', marginTop: 2 }}>
                    {f.es_emitido ? '↑ emitida' : '↓ recibida'}
                  </span>
                </td>
                <td style={{ padding: '10px 14px', maxWidth: 180 }}>
                  <span style={{ fontFamily: 'monospace', fontSize: 11, color: '#64748b', display:'block' }}>{f.emisor_rfc}</span>
                  <span style={{ color: '#334155', display:'block', overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{f.emisor_nombre}</span>
                </td>
                <td style={{ padding: '10px 14px', maxWidth: 180 }}>
                  <span style={{ fontFamily: 'monospace', fontSize: 11, color: '#64748b', display:'block' }}>{f.receptor_rfc}</span>
                  <span style={{ color: '#334155', display:'block', overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{f.receptor_nombre}</span>
                </td>
                <td style={{ padding: '10px 14px', color: '#475569', maxWidth: 220 }}>
                  <span style={{ display:'block', overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }} title={f.concepto}>{f.concepto || <em style={{color:'#cbd5e1'}}>—</em>}</span>
                  {f.folio && <span style={{ fontSize: 11, color: '#94a3b8' }}>Folio {f.folio}</span>}
                </td>
                <td style={{ padding: '10px 14px', fontWeight: 600, color: f.total > 0 ? (f.es_emitido ? '#059669' : '#e11d48') : '#94a3b8', whiteSpace:'nowrap' }}>
                  {f.total > 0 ? fmt(f.total) : <span style={{ color: '#94a3b8', fontWeight: 400, fontSize: 11 }}>— (compl.)</span>}
                </td>
                <td style={{ padding: '10px 14px', color: '#94a3b8', fontSize: 12 }}>{f.moneda}</td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>

      <Pager page={page} total={totalPages} onChange={setPage} />

      <DetailPanel factura={selected} onClose={() => setSelected(null)} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('cfdis-root')).render(<App />);
</script>
{% endraw %}
{% endblock %}
