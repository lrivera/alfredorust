{% extends "layouts/base.html" %}
{% block title %}{% if is_edit %}Editar{% else %}Nuevo{% endif %} Proyecto{% endblock %}
{% block content %}
  <div class="pb-6">
    <h1 class="text-2xl font-semibold text-slate-800">{% if is_edit %}Editar{% else %}Nuevo{% endif %} Proyecto</h1>
  </div>

  <div class="max-w-2xl">
    <form method="post" action="{{ action }}" class="space-y-6">
      <div>
        <label for="title" class="block text-sm font-medium text-slate-700">Título *</label>
        <input type="text" name="title" id="title" value="{{ title }}" required
          class="mt-1 block w-full rounded-md border border-slate-300 px-3 py-2 text-sm shadow-sm focus:border-sky-500 focus:outline-none focus:ring-1 focus:ring-sky-500">
      </div>

      <div>
        <label for="description" class="block text-sm font-medium text-slate-700">Descripción</label>
        <textarea name="description" id="description" rows="3"
          class="mt-1 block w-full rounded-md border border-slate-300 px-3 py-2 text-sm shadow-sm focus:border-sky-500 focus:outline-none focus:ring-1 focus:ring-sky-500">{{ description }}</textarea>
      </div>

      <div class="grid grid-cols-2 gap-4">
        <div>
          <label for="contact_id" class="block text-sm font-medium text-slate-700">Cliente</label>
          <select name="contact_id" id="contact_id"
            class="mt-1 block w-full rounded-md border border-slate-300 px-3 py-2 text-sm shadow-sm focus:border-sky-500 focus:outline-none focus:ring-1 focus:ring-sky-500">
            <option value="">-- Seleccionar --</option>
            {% for c in contacts %}
            <option value="{{ c.value }}" {% if c.value == contact_id %}selected{% endif %}>{{ c.label }}</option>
            {% endfor %}
          </select>
        </div>

        <div>
          <label for="category_id" class="block text-sm font-medium text-slate-700">Categoría</label>
          <select name="category_id" id="category_id"
            class="mt-1 block w-full rounded-md border border-slate-300 px-3 py-2 text-sm shadow-sm focus:border-sky-500 focus:outline-none focus:ring-1 focus:ring-sky-500">
            <option value="">-- Seleccionar --</option>
            {% for c in categories %}
            <option value="{{ c.value }}" {% if c.value == category_id %}selected{% endif %}>{{ c.label }}</option>
            {% endfor %}
          </select>
        </div>
      </div>

      <div class="grid grid-cols-2 gap-4">
        <div>
          <label for="priority" class="block text-sm font-medium text-slate-700">Prioridad</label>
          <select name="priority" id="priority"
            class="mt-1 block w-full rounded-md border border-slate-300 px-3 py-2 text-sm shadow-sm focus:border-sky-500 focus:outline-none focus:ring-1 focus:ring-sky-500">
            {% for p in priority_options %}
            <option value="{{ p.0 }}" {% if p.0 == priority %}selected{% endif %}>{{ p.1 }}</option>
            {% endfor %}
          </select>
        </div>

        <div>
          <label for="total_budget" class="block text-sm font-medium text-slate-700">Presupuesto estimado</label>
          <input type="number" name="total_budget" id="total_budget" value="{{ total_budget }}" step="0.01" min="0"
            class="mt-1 block w-full rounded-md border border-slate-300 px-3 py-2 text-sm shadow-sm focus:border-sky-500 focus:outline-none focus:ring-1 focus:ring-sky-500">
        </div>
      </div>

      <div>
        <label for="scheduled_at" class="block text-sm font-medium text-slate-700">Fecha límite</label>
        <input type="date" name="scheduled_at" id="scheduled_at" value="{{ scheduled_at }}"
          class="mt-1 block w-full rounded-md border border-slate-300 px-3 py-2 text-sm shadow-sm focus:border-sky-500 focus:outline-none focus:ring-1 focus:ring-sky-500">
      </div>

      <div>
        <label for="notes" class="block text-sm font-medium text-slate-700">Notas</label>
        <textarea name="notes" id="notes" rows="3"
          class="mt-1 block w-full rounded-md border border-slate-300 px-3 py-2 text-sm shadow-sm focus:border-sky-500 focus:outline-none focus:ring-1 focus:ring-sky-500">{{ notes }}</textarea>
      </div>

      {% if errors.is_some() %}
      <div class="rounded-md bg-rose-50 p-4 text-sm text-rose-700">{{ errors.as_ref().unwrap() }}</div>
      {% endif %}

      <div class="flex gap-3">
        <button type="submit"
          class="inline-flex items-center rounded-md bg-sky-600 px-4 py-2 text-sm font-semibold text-white shadow-sm transition hover:bg-sky-700">
          {% if is_edit %}Actualizar{% else %}Crear{% endif %}
        </button>
        <a href="/admin/projects" class="px-4 py-2 text-sm text-slate-600 hover:text-slate-800">Cancelar</a>
      </div>
    </form>
  </div>
{% endblock %}
